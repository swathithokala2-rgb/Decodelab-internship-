<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Online Book Store</title>
    <link rel="stylesheet" href="project_1.css">
</head>
<body>

<header>
    <h1>Online Book Store</h1>
    <a href="login.html">Login</a>
    <a href="admin.html">Admin</a>
    <a href="orders.html">Orders</a>
    <a href="profile.html">Profile</a>
    <nav>
        <a href="#">Home</a>
        <a href="#books">Books</a>
        <a href="#categories">Categories</a>
        <a href="#contact">Contact</a>
    </nav>
    <div id="userSection">
    <span id="welcomeUser"></span>
    <button onclick="logout()">Logout</button>
</div>
    <div id="cartCount">🛒 Cart: 0</div>
    <button id="darkModeBtn">🌙 Dark Mode</button>
</header>

<section class="hero">
    <h2>Discover Your Next Favorite Book</h2>
    <button id="shopBtn">Shop Now</button>
</section>

<section class="search-section">
    <input type="text" id="searchBox" placeholder="Search Books...">
    <button onclick="searchBook()">Search</button>
</section>

<!-- MongoDB nunchi books ikkada load avuthayi -->
<section id="books" class="books">

</section>

<section id="categories">
    <h2>Categories</h2>

    <div class="category-container">
        <div class="category">Programming</div>
        <div class="category">Science</div>
        <div class="category">History</div>
        <div class="category">Fiction</div>
    </div>
</section>

<section id="contact">
    <h2>Contact Us</h2>

    <input type="text" placeholder="Enter Name" required>
    <input type="email" placeholder="Enter Email" required>

    <br><br>

    <button>Submit</button>
</section>
<section id="cartSection">
    <h2>Shopping Cart</h2>

    <div id="cartItems"></div>

    <h3 id="totalPrice">Total: ₹0</h3>
    <button onclick="placeOrder()">
    Place Order
</button>
</section>
<section id="wishlistSection">
    <h2>❤️ Wishlist</h2>

    <div id="wishlistItems">
        <div class="rating-section">
    ⭐⭐⭐⭐⭐
    <p id="ratingCount-${book.title}">
    Reviews: 0
</p>

    <br><br>

    <input
        type="text"
        id="review-${book.title}"
        placeholder="Write Review">

    <button onclick="addReview('${book.title}')">
        Submit Review
    </button>

    <div id="reviews-${book.title}"></div>
</div>
    </div>
</section>
<footer>
    <p>© 2026 Online Book Store | All Rights Reserved</p>
</footer>

<script src="project_1.js"></script>

</body>
</html>
